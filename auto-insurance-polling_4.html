<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Auto Insurance Polling — Cinematic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    color: #fff;
  }
  button { font-family: inherit; }

  .phone {
    width: 430px;
    height: 932px;
    border-radius: 56px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    border: 8px solid #1a1a1a;
    background: #000;
  }

  /* Scene layers */
  .scene {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 800ms ease-in-out;
    z-index: 1;
  }
  .scene.active { opacity: 1; }
  .scene-image {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    transform-origin: center;
  }
  .scene.active .scene-image {
    animation: ken-burns 8s ease-out forwards;
  }
  .scene-grade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,40,40,0.10) 0%, rgba(0,20,40,0.20) 100%);
    mix-blend-mode: multiply;
  }

  /* Vignettes */
  .vignette-top, .vignette-bottom {
    position: absolute; left: 0; right: 0;
    pointer-events: none;
    z-index: 2;
  }
  .vignette-top {
    top: 0; height: 200px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
  }
  .vignette-bottom {
    bottom: 0; height: 380px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.65) 50%, rgba(0,0,0,0.92) 100%);
  }

  /* Status bar */
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 54px;
    padding: 18px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    z-index: 10;
    letter-spacing: -0.02em;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { display: block; }

  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 122px; height: 36px;
    background: #000;
    border-radius: 999px;
    z-index: 11;
  }

  /* Cancel X */
  .cancel-btn {
    position: absolute;
    top: 70px; right: 16px;
    width: 40px; height: 40px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    color: rgba(255,255,255,0.85);
  }

  /* Brand chip */
  .brand-chip {
    position: absolute;
    top: 76px; left: 24px;
    z-index: 10;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.32);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.16);
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .brand-chip .dot {
    width: 6px; height: 6px;
    border-radius: 999px;
    background: #00E5C4;
    animation: pulse-dot 1.2s ease-in-out infinite;
  }

  /* Bottom content */
  .bottom-content {
    position: absolute;
    left: 0; right: 0; bottom: 56px;
    padding: 0 32px;
    z-index: 5;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    color: #E1FEFA;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.92;
  }
  .headline {
    font-size: 26px;
    line-height: 32px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #fff;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    margin-bottom: 28px;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .status-row.animate {
    animation: fade-up 400ms ease-out;
  }
  .status-text {
    font-size: 16px;
    line-height: 22px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.01em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  /* Spinner */
  .spinner {
    flex-shrink: 0;
    animation: spin 1.1s linear infinite;
  }

  /* Segmented progress */
  .segments {
    display: flex;
    gap: 6px;
  }
  .segment {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.20);
    border-radius: 999px;
    overflow: hidden;
  }
  .segment-fill {
    height: 100%;
    width: 0;
    background: #fff;
    border-radius: 999px;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: #fff;
    border-radius: 999px;
    z-index: 12;
    opacity: 0.9;
  }

  /* Demo controls */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    color: #fff;
  }
  .replay {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: -0.01em;
  }
  .replay:hover { background: rgba(255,255,255,0.14); }
  .meta {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }
  .meta.divider {
    padding-left: 8px;
    border-left: 1px solid rgba(255,255,255,0.2);
  }
  .footnote {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    max-width: 380px;
    text-align: center;
    line-height: 1.5;
  }

  /* Animations */
  @keyframes ken-burns {
    0%   { transform: scale(1.0)  translate(0, 0); }
    100% { transform: scale(1.18) translate(-2%, -3%); }
  }
  @keyframes fade-up {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(0.6); opacity: 0.5; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="phone">

  <!-- Scenes (4 background layers, cross-fade) -->
  <!-- Scene 1: dashboard POV (kept) -->
  <div class="scene" data-i="0">
    <div class="scene-image" style="background-image:url('https://images.pexels.com/photos/1545743/pexels-photo-1545743.jpeg?auto=compress&cs=tinysrgb&w=1080');"></div>
    <div class="scene-grade"></div>
  </div>
  <!-- Scene 2: 2G — Coastal cliff drive at sunset -->
  <div class="scene" data-i="1">
    <div class="scene-image" style="background-image:url('https://images.pexels.com/photos/1592384/pexels-photo-1592384.jpeg?auto=compress&cs=tinysrgb&w=1080');"></div>
    <div class="scene-grade"></div>
  </div>
  <!-- Scene 3: 3E — Aerial city intersection -->
  <div class="scene" data-i="2">
    <div class="scene-image" style="background-image:url('https://images.pexels.com/photos/186537/pexels-photo-186537.jpeg?auto=compress&cs=tinysrgb&w=1080');"></div>
    <div class="scene-grade"></div>
  </div>
  <!-- Scene 4: hero car at golden hour — the reward shot -->
  <div class="scene" data-i="3">
    <div class="scene-image" style="background-image:url('https://images.pexels.com/photos/5914343/pexels-photo-5914343.jpeg?auto=compress&cs=tinysrgb&w=1080');"></div>
    <div class="scene-grade"></div>
  </div>

  <!-- Vignettes -->
  <div class="vignette-top"></div>
  <div class="vignette-bottom"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span>11:47</span>
    <div class="status-icons">
      <!-- signal -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M2 22h2v-4H2v4zm4 0h2v-7H6v7zm4 0h2v-10h-2v10zm4 0h2v-13h-2v13zm4 0h2V6h-2v16z"/></svg>
      <!-- wifi -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      <!-- battery -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
    </div>
  </div>

  <div class="dynamic-island"></div>

  <!-- Cancel X -->
  <button class="cancel-btn" aria-label="Cancel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>

  <!-- Brand chip -->
  <div class="brand-chip">
    <span class="dot"></span>
    Auto Insurance
  </div>

  <!-- Bottom content -->
  <div class="bottom-content">
    <div class="eyebrow" id="eyebrow">Step 1 of 4</div>
    <h1 class="headline">
      You're moments from<br/>
      your best deal on auto.
    </h1>

    <div class="status-row" id="status-row">
      <svg class="spinner" width="22" height="22" viewBox="0 0 22 22">
        <circle cx="11" cy="11" r="9" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2.2"/>
        <path d="M 11 2 A 9 9 0 0 1 20 11" fill="none" stroke="#00E5C4" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span class="status-text" id="status-text">Preparing your application</span>
    </div>

    <div class="segments" id="segments">
      <div class="segment"><div class="segment-fill" data-i="0"></div></div>
      <div class="segment"><div class="segment-fill" data-i="1"></div></div>
      <div class="segment"><div class="segment-fill" data-i="2"></div></div>
      <div class="segment"><div class="segment-fill" data-i="3"></div></div>
    </div>
  </div>

  <div class="home-indicator"></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="replay" id="replay">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    Replay
  </button>
  <span class="meta" id="meta-time">0.0s / 20.0s</span>
  <span class="meta divider" id="meta-step">Step 1 of 4</span>
</div>

<p class="footnote">
  Prototype uses still photography with Ken Burns motion. Production replaces each scene with a 5–6s muted-loop video clip; cross-fade timing stays the same.
</p>

<script>
  const STATUSES = [
    'Preparing your application',
    'Connecting with top insurers',
    'Analyzing your driving profile',
    'Personalizing your best rates',
  ];
  const STEP_DURATION = 5; // seconds
  const TOTAL = STEP_DURATION * STATUSES.length;

  const scenes = document.querySelectorAll('.scene');
  const segmentFills = document.querySelectorAll('.segment-fill');
  const eyebrowEl = document.getElementById('eyebrow');
  const statusTextEl = document.getElementById('status-text');
  const statusRowEl = document.getElementById('status-row');
  const metaTimeEl = document.getElementById('meta-time');
  const metaStepEl = document.getElementById('meta-step');
  const replayBtn = document.getElementById('replay');

  let startTime = Date.now();
  let lastStep = -1;
  let raf = null;

  function tick() {
    const elapsed = Math.min((Date.now() - startTime) / 1000, TOTAL);
    const activeStep = Math.min(Math.floor(elapsed / STEP_DURATION), STATUSES.length - 1);
    const stepProgress = ((elapsed % STEP_DURATION) / STEP_DURATION) * 100;

    // Update scenes
    scenes.forEach((s, i) => s.classList.toggle('active', i === activeStep));

    // Update segments
    segmentFills.forEach((seg, i) => {
      const fill = i < activeStep ? 100 : i === activeStep ? stepProgress : 0;
      seg.style.width = fill + '%';
      seg.style.transition = i === activeStep ? 'width 100ms linear' : 'width 300ms ease';
    });

    // Update text on step change
    if (activeStep !== lastStep) {
      lastStep = activeStep;
      eyebrowEl.textContent = `Step ${activeStep + 1} of ${STATUSES.length}`;
      statusTextEl.textContent = STATUSES[activeStep];
      metaStepEl.textContent = `Step ${activeStep + 1} of ${STATUSES.length}`;
      // Re-trigger fade-up animation
      statusRowEl.classList.remove('animate');
      void statusRowEl.offsetWidth; // reflow
      statusRowEl.classList.add('animate');
    }

    // Meta time
    metaTimeEl.textContent = `${elapsed.toFixed(1)}s / ${TOTAL.toFixed(1)}s`;

    if (elapsed < TOTAL) {
      raf = requestAnimationFrame(tick);
    }
  }

  function start() {
    cancelAnimationFrame(raf);
    startTime = Date.now();
    lastStep = -1;
    tick();
  }

  replayBtn.addEventListener('click', start);
  start();
</script>

</body>
</html>
